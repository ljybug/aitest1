<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Redirecting...</title>
  <script>
    // GitHub Pages SPA fallback
    var path = location.pathname.replace(/^\/aitest1/, '') || '/';
    var target = '/aitest1/?p=' + encodeURIComponent(path + location.search + location.hash);
    location.replace(target);
  </script>
</head>
<body></body>
</html>
