<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AITEST1 登录页</title>
  <style>
    body { font-family: Arial, sans-serif; background:#f6f8fa; display:flex; min-height:100vh; align-items:center; justify-content:center; margin:0; }
    .card { background:#fff; padding:24px; border-radius:12px; box-shadow:0 8px 24px rgba(0,0,0,.08); width:340px; }
    h1 { font-size:20px; margin:0 0 16px; }
    input { width:100%; padding:10px; margin:8px 0; border:1px solid #d0d7de; border-radius:8px; box-sizing:border-box; }
    button { width:100%; padding:10px; border:none; border-radius:8px; background:#2f81f7; color:#fff; font-weight:600; cursor:pointer; }
    .tip { margin-top:10px; color:#57606a; font-size:12px; }
  </style>
</head>
<body>
  <div class="card">
    <h1>欢迎登录</h1>
    <input id="username" type="text" placeholder="用户名 (默认 admin)" value="admin" />
    <input id="password" type="password" placeholder="密码 (默认 123456)" value="123456" />
    <button id="btn" type="button">登录</button>
    <div id="result" class="tip">API: __API_BASE__/api/login</div>
  </div>

  <script>
    const API_BASE = '__API_BASE__';
    const result = document.getElementById('result');
    document.getElementById('btn').addEventListener('click', async () => {
      const username = document.getElementById('username').value.trim();
      const password = document.getElementById('password').value;
      result.textContent = '请求中...';
      try {
        const resp = await fetch(`${API_BASE}/api/login`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, password })
        });
        const data = await resp.json();
        result.textContent = data.ok ? `登录成功: ${data.user.username}` : `登录失败: ${data.message}`;
      } catch (e) {
        result.textContent = `请求失败: ${e.message}`;
      }
    });
  </script>
</body>
</html>
